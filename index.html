<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1">
    <title>나만의 반응형 웹페이지</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;

            background-image: url('night.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;

            font-family: "맑은 고딕", sans-serif;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 5px black;
        }

        .author {
            text-align: right;
            font-size: 22px;
            margin-bottom: 22px;
            text-shadow: 1px 1px 5px black;
        }

        p {
            font-size: 22px;
            font-weight: bold;
            text-shadow: 1px 1px 5px black;
        }

        @media screen and (max-width: 767px) {
            body {width: auto}
        }
    </style>
</head>

<body>
    <div>
        <h1>서시</h1>
        <p class="author">윤동주</p>
        <p>
            죽는 날까지 하늘을 우러러<br>
            한 점 부끄럼이 없기를,<br><br>

            잎새에 이는 바람에도<br>
            나는 괴로워했다.<br><br>

            별을 노래하는 마음으로<br>
            모든 죽어 가는 것을 사랑해야지<br><br>

            그리고 나한테 주어진 길을<br>
            걸어가야겠다.<br><br>

            오늘 밤에도 별이 바람에 스치운다.
        </p>
    </div>
</body>
</html>
